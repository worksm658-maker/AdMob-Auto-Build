name: Android APK Build (AdMob Injection)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Apktool
      run: |
        wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O apktool.jar

    - name: Build Modded APK
      run: |
        java -jar apktool.jar b FrenzyBlast_Decompiled -o FrenzyBlast_Modded.apk

    - name: Sign APK (Debug Key)
      run: |
        # Menggunakan debug keystore bawaan Android untuk menandatangani APK agar bisa diinstall
        sudo apt-get install -y apksigner
        # Catatan: Kita bisa menambahkan langkah pembuatan keystore jika diperlukan
        # Untuk tahap ini, kita fokus pada hasil build terlebih dahulu

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: FrenzyBlast-AdMob-Build
        path: FrenzyBlast_Modded.apk
