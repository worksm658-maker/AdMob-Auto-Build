name: Android APK Build (AdMob Injection)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Apktool
      run: |
        wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O apktool.jar

    - name: Build Modded APK
      run: |
        # Memastikan folder decompiled ada sebelum build
        if [ -d "FrenzyBlast_Decompiled" ]; then
          java -jar apktool.jar b FrenzyBlast_Decompiled -o FrenzyBlast_Modded.apk
        else
          echo "Error: FrenzyBlast_Decompiled directory not found!"
          exit 1
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FrenzyBlast-AdMob-Build
        path: FrenzyBlast_Modded.apk
