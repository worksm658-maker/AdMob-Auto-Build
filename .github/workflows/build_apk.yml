name: Android APK Build & Auto-Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan untuk membuat rilis

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Apktool (Self-Healing)
      run: |
        URL="https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar"
        echo "Mencoba mendownload dari link utama..."
        if ! curl -L -f "$URL" -o apktool.jar; then
          echo "Link utama mati (404). Mencari versi terbaru secara automatis..."
          LATEST_URL=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
          echo "Mendownload versi terbaru dari: $LATEST_URL"
          curl -L "$LATEST_URL" -o apktool.jar
        fi
        if [ ! -f "apktool.jar" ] || [ $(stat -c%s "apktool.jar") -lt 1000 ]; then
          echo "ERROR: Gagal mendapatkan file Apktool yang valid."
          exit 1
        fi

    - name: Build Frenzy Blast
      run: |
        if [ -d "FrenzyBlast_Decompiled" ]; then
          java -jar apktool.jar b FrenzyBlast_Decompiled -o FrenzyBlast_Modded.apk
        fi

    - name: Build Merge Fruit Master
      run: |
        if [ -d "MergeFruit_Decompiled" ]; then
          java -jar apktool.jar b MergeFruit_Decompiled -o MergeFruit_Modded.apk
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }} (AdMob Injected)
        body: |
          Build Otomatis oleh Omni-AI Agent.
          
          Daftar APK Modifikasi:
          1. Frenzy Blast (AdMob Injected)
          2. Merge Fruit Master (AdMob Injected)
        files: |
          FrenzyBlast_Modded.apk
          MergeFruit_Modded.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
