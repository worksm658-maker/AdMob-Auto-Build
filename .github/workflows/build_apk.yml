name: Android APK Build & Auto-Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan untuk membuat rilis

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Apktool
      run: |
        curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o apktool.jar

    - name: Build Frenzy Blast
      run: |
        if [ -d "FrenzyBlast_Decompiled" ]; then
          java -jar apktool.jar b FrenzyBlast_Decompiled -o FrenzyBlast_Modded.apk
        fi

    - name: Build Merge Fruit Master
      run: |
        if [ -d "MergeFruit_Decompiled" ]; then
          java -jar apktool.jar b MergeFruit_Decompiled -o MergeFruit_Modded.apk
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }} (AdMob Injected)
        body: |
          Build Otomatis oleh Omni-AI Agent.
          
          Daftar APK Modifikasi:
          1. Frenzy Blast (AdMob Injected)
          2. Merge Fruit Master (AdMob Injected)
        files: |
          FrenzyBlast_Modded.apk
          MergeFruit_Modded.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
